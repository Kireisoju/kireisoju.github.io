<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plinko Volume Slider</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="wrap">
    <h2 class="sr-only">Plinko volume picker — hover to aim, click to drop</h2>
    <div id="vol-display">
      <span id="vol-number">50%</span>
      <span id="vol-label">current volume</span>
    </div>
    <canvas id="board" width="340" height="370"></canvas>
    <div id="hint">Move over the board to aim, click to drop</div>
    <div id="controls">
      <div class="row">
        <button id="btn-reset">Reset</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
