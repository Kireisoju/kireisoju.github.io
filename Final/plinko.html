<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plinko Volume Slider</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <h2 class="sr-only">Plinko volume slider — drop a ball to set the volume level</h2>
    <div id="board-wrap">
      <canvas id="board" width="340" height="400"></canvas>
    </div>
    <div id="controls">

      <div class="btn-row">
        <button id="btn-drop">Drop ball</button>
        <button id="btn-reset">Reset</button>
        <button id="btn-submit">Submit</button>
      </div>
      <div id="status"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
